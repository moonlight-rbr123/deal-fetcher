<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Fetcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0F1C4F 0%, #1F3A8A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1B2E7E;
            border-radius: 20px;
            border: 3px solid #2A4CB8;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #FFFFFF;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            color: #B0C4FF;
            font-size: 14px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #A8B8E8;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #3A5FD8;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            background: #FFFFFF;
            color: #333;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D91E63 0%, #C41E50 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(217, 30, 99, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(217, 30, 99, 0.5);
            background: linear-gradient(135deg, #E535B8 0%, #D91E63 100%);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #3A5FD8;
            color: #FFFFFF;
        }

        .btn-secondary:hover {
            background: #4A70E8;
        }

        .deals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .deals-grid .deal-button:first-child {
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .deals-grid {
                grid-template-columns: 1fr;
            }
        }

        .deal-button {
            padding: 15px;
            border: 2px solid #3A5FD8;
            background: #2A4CB8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .deal-button:hover {
            border-color: #FFD700;
            background: #3A5FD8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
        }

        .deal-button.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #2A5F3F;
            color: #7DFFAD;
            border: 1px solid #4A8F5F;
        }

        .message.error {
            background: #5F3F3F;
            color: #FF9999;
            border: 1px solid #8F5F5F;
        }

        .message.info {
            background: #3A5FD8;
            color: #E8F0FF;
            border: 1px solid #5A7FFF;
        }

        .link-box {
            background: #2A4CB8;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            word-break: break-all;
            font-size: 12px;
            color: #B0C4FF;
            font-family: 'Courier New', monospace;
            border: 1px solid #3A5FD8;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
        }

        .logout-btn {
            background: linear-gradient(135deg, #D91E63 0%, #C41E50 100%);
            margin-top: 20px;
            box-shadow: 0 8px 16px rgba(217, 30, 99, 0.3);
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #E535B8 0%, #D91E63 100%);
            box-shadow: 0 12px 24px rgba(217, 30, 99, 0.5);
        }

        .user-info {
            background: #2A4CB8;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #B0C4FF;
            border: 1px solid #3A5FD8;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #A8B8E8;
            border-top: 2px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .copy-button {
            background: #FFD700;
            color: #1B2E7E;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .copy-button:hover {
            background: #FFED4E;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .copy-button.copied {
            background: #4caf50;
            color: white;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Deal Fetcher</h1>
            <p>Give others a link to buy you tanks!</p>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="section active">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="button btn-primary">Login</button>
            </form>
            <div id="loginError" class="message error" style="display: none; margin-top: 15px;"></div>
        </div>

        <!-- Deals Section -->
        <div id="dealsSection" class="section">
            <div class="user-info">
                Logged in as: <strong id="userEmail"></strong>
            </div>

            <div id="dealsMessage" class="message info" style="display: none;"></div>
            <div id="dealsError" class="message error" style="display: none;"></div>

            <h2 style="margin-bottom: 20px; color: #FFFFFF; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Available Deals</h2>
            <div id="dealsGrid" class="deals-grid"></div>

            <!-- Purchase Link Result -->
            <div id="resultSection" style="display: none; margin-top: 30px; padding-top: 30px; border-top: 2px solid #3A5FD8;">
                <h3 style="color: #FFFFFF; margin-bottom: 15px; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Your Purchase Link</h3>
                <div id="linkMessage" class="message success"></div>
                <div class="link-box" id="purchaseLink"></div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="copy-button" onclick="copyLink(this)">📋 Copy Link</button>
                    <button type="button" class="button btn-primary" style="flex: 1;" onclick="openLink()">🔗 Open Link</button>
                </div>
            </div>

            <button type="button" class="button logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        let currentEmail = '';
        let currentPurchaseLink = '';

        // Backend API URL - change this before deploying
        // For GitHub Pages + external backend: 'https://your-backend.railway.app'
        // For same-domain deployment: ''
        const API_BASE_URL = '';

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginError = document.getElementById('loginError');

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Logging in...';

            try {
                const response = await fetch(API_BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    let errorMessage = data.error || 'Login failed';
                    if (errorMessage.toLowerCase().includes('account not found') || errorMessage.toLowerCase().includes('user not found')) {
                        errorMessage = 'Account not found';
                    } else if (response.status === 401 || errorMessage.toLowerCase().includes('authenticate')) {
                        errorMessage = 'Invalid credentials';
                    }
                    throw new Error(errorMessage);
                }

                // Success - show deals
                currentEmail = email;
                document.getElementById('userEmail').textContent = email;
                displayDeals(data.deals);
                document.getElementById('loginSection').classList.remove('active');
                document.getElementById('dealsSection').classList.add('active');
                loginError.style.display = 'none';

            } catch (error) {
                loginError.textContent = '❌ ' + error.message;
                loginError.style.display = 'block';
                console.error('Login error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });

        function displayDeals(deals) {
            const dealsGrid = document.getElementById('dealsGrid');
            dealsGrid.innerHTML = '';

            if (!deals || deals.length === 0) {
                const message = document.getElementById('dealsMessage');
                message.textContent = 'ℹ️ No active deals available at the moment.';
                message.style.display = 'block';
                return;
            }

            deals.forEach(deal => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'deal-button';
                button.textContent = deal.name;
                button.onclick = () => getPurchaseLink(deal.id, deal.name, button);
                dealsGrid.appendChild(button);
            });
        }

        async function getPurchaseLink(dealId, dealName, buttonElement) {
            const dealsError = document.getElementById('dealsError');
            const resultSection = document.getElementById('resultSection');

            buttonElement.classList.add('loading');
            buttonElement.disabled = true;
            const originalText = buttonElement.textContent;
            buttonElement.innerHTML = '<span class="loading-spinner"></span>Loading...';

            try {
                const response = await fetch(API_BASE_URL + '/api/get-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, dealId: dealId })
                });

                const data = await response.json();

                if (!response.ok) {
                    let errorMessage = data.error || 'Failed to get purchase link';
                    if (response.status === 401) {
                        errorMessage = 'Session expired. Please login again.';
                    } else if (response.status === 404) {
                        errorMessage = 'Deal not found';
                    }
                    throw new Error(errorMessage);
                }

                // Success - display the link
                currentPurchaseLink = data.link;
                document.getElementById('purchaseLink').textContent = data.link;
                document.getElementById('linkMessage').textContent = `✅ Purchase link for ${dealName} is ready!`;
                resultSection.style.display = 'block';
                dealsError.style.display = 'none';

                // Scroll to result
                resultSection.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                dealsError.textContent = '❌ ' + error.message;
                dealsError.style.display = 'block';
                resultSection.style.display = 'none';
                console.error('Get link error:', error);
            } finally {
                buttonElement.classList.remove('loading');
                buttonElement.disabled = false;
                buttonElement.textContent = originalText;
            }
        }

        function copyLink(btn) {
            if (!currentPurchaseLink) return;

            navigator.clipboard.writeText(currentPurchaseLink).then(() => {
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy Link';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }

        function openLink() {
            if (currentPurchaseLink) {
                window.open(currentPurchaseLink, '_blank');
            }
        }

        function logout() {
            currentEmail = '';
            currentPurchaseLink = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('dealsError').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('loginSection').classList.add('active');
            document.getElementById('dealsSection').classList.remove('active');
        }

        // Check for background.png and set background accordingly
        const bgUrl = API_BASE_URL ? API_BASE_URL + '/background.png' : 'background.png';
        fetch(bgUrl)
            .then(response => {
                if (response.ok) {
                    document.body.style.backgroundImage = `url(${bgUrl})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundRepeat = 'no-repeat';
                }
            })
            .catch(() => {
                // Keep the gradient background (already set in CSS)
            });
    </script>
</body>
</html>
